<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>フリー室 空室状況マップ</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --panel: #ffffff;
      --ink: #182235;
      --muted: #667085;
      --free: #12a05c;
      --free-soft: rgba(18, 160, 92, .72);
      --busy: #e53935;
      --busy-soft: rgba(229, 57, 53, .72);
      --checking: #2563eb;
      --checking-soft: rgba(37, 99, 235, .62);
      --error: #6b7280;
      --error-soft: rgba(107, 114, 128, .62);
      --shadow: 0 16px 44px rgba(15, 23, 42, .12);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: radial-gradient(circle at top left, #e8f1ff 0, transparent 34%), var(--bg);
    }
    .page {
      width: min(1280px, 100%);
      margin: 0 auto;
      padding: clamp(12px, 2.4vw, 24px);
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 14px;
    }
    .title h1 {
      margin: 0 0 4px;
      font-size: clamp(1.4rem, 2.8vw, 2.2rem);
      letter-spacing: .03em;
      line-height: 1.15;
    }
    .title p { margin: 0; color: var(--muted); font-weight: 700; }
    .clock {
      text-align: right;
      white-space: nowrap;
      font-weight: 900;
    }
    #clockTime { font-size: clamp(2rem, 5vw, 4.2rem); line-height: .95; }
    #clockDate { margin-top: 5px; color: var(--muted); font-size: clamp(.86rem, 1.8vw, 1.05rem); }
    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 330px;
      gap: 16px;
      align-items: stretch;
    }
    .map-card, .side-card {
      background: rgba(255, 255, 255, .92);
      border: 1px solid rgba(148, 163, 184, .26);
      border-radius: 24px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .map-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid #e5e7eb;
    }
    .map-head strong { font-size: 1.1rem; }
    .legend { display: flex; flex-wrap: wrap; gap: 8px; justify-content: flex-end; }
    .legend span { display: inline-flex; align-items: center; gap: 6px; color: var(--muted); font-weight: 800; font-size: .86rem; }
    .legend i { width: 12px; height: 12px; border-radius: 999px; display: inline-block; }
    .dot-free { background: var(--free); }
    .dot-busy { background: var(--busy); }
    .dot-checking { background: var(--checking); }
    .map-wrap {
      position: relative;
      width: 100%;
      background: #e5e7eb;
      user-select: none;
    }
    .floor-img {
      display: block;
      width: 100%;
      height: auto;
    }
    .room-zone {
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: #fff;
      border: 5px solid rgba(255,255,255,.85);
      border-radius: 4px;
      box-shadow: 0 0 0 3px rgba(15, 23, 42, .15), inset 0 0 0 999px var(--checking-soft);
      outline: none;
      overflow: hidden;
      transition: transform .15s ease, box-shadow .15s ease, filter .15s ease;
    }
    .room-zone:hover, .room-zone:focus-visible {
      transform: translateY(-2px) scale(1.01);
      box-shadow: 0 12px 30px rgba(15, 23, 42, .22), 0 0 0 5px rgba(37, 99, 235, .22), inset 0 0 0 999px var(--checking-soft);
      filter: brightness(1.03);
    }
    .room-zone.free { box-shadow: 0 0 0 3px rgba(18,160,92,.45), inset 0 0 0 999px var(--free-soft); border-color: #10b981; }
    .room-zone.busy { box-shadow: 0 0 0 3px rgba(229,57,53,.46), inset 0 0 0 999px var(--busy-soft); border-color: #ef4444; }
    .room-zone.error { box-shadow: 0 0 0 3px rgba(107,114,128,.42), inset 0 0 0 999px var(--error-soft); border-color: #6b7280; }
    .room-zone.free:hover, .room-zone.free:focus-visible { box-shadow: 0 12px 30px rgba(15, 23, 42, .22), 0 0 0 5px rgba(18,160,92,.22), inset 0 0 0 999px var(--free-soft); }
    .room-zone.busy:hover, .room-zone.busy:focus-visible { box-shadow: 0 12px 30px rgba(15, 23, 42, .22), 0 0 0 5px rgba(229,57,53,.22), inset 0 0 0 999px var(--busy-soft); }
    .room-label {
      width: min(88%, 170px);
      text-align: center;
      padding: 6px 8px;
      border-radius: 12px;
      background: rgba(0,0,0,.34);
      backdrop-filter: blur(4px);
      text-shadow: 0 2px 8px rgba(0,0,0,.35);
    }
    .room-name { font-size: clamp(.68rem, 1.15vw, 1rem); font-weight: 900; line-height: 1.12; }
    .room-status { margin-top: 3px; font-size: clamp(.95rem, 1.85vw, 1.65rem); font-weight: 1000; line-height: 1; letter-spacing: .04em; white-space: nowrap; }
    .room-sub { margin-top: 4px; font-size: clamp(.5rem, .82vw, .68rem); font-weight: 800; opacity: .95; line-height: 1.35; }
    .room5 .room-label { width: min(86%, 150px); padding: 5px 7px; }
    .room5 .room-name { font-size: clamp(.62rem, 1vw, .9rem); }
    .room5 .room-status { font-size: clamp(.82rem, 1.45vw, 1.25rem); }
    .room5 .room-sub { font-size: clamp(.46rem, .7vw, .58rem); margin-top: 3px; }
    .room4 { left: 70.20%; top: 16.90%; width: 23.20%; height: 29.30%; }
    .room5 { left: 70.20%; top: 47.30%; width: 23.20%; height: 15.00%; }
    .room6 { left: 70.20%; top: 62.80%; width: 28.60%; height: 19.60%; }
    .side-card { padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    .side-title { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .side-title h2 { margin: 0; font-size: 1.1rem; }
    .refresh-btn {
      appearance: none;
      border: 0;
      background: #172554;
      color: #fff;
      border-radius: 999px;
      padding: 9px 14px;
      font-weight: 900;
      cursor: pointer;
    }
    .refresh-btn:disabled { opacity: .5; cursor: wait; }
    .status-list { display: grid; gap: 10px; }
    .status-card {
      display: block;
      text-decoration: none;
      color: inherit;
      border: 1px solid #e5e7eb;
      border-radius: 18px;
      padding: 13px;
      background: #fff;
      transition: transform .15s ease, border-color .15s ease;
    }
    .status-card:hover { transform: translateY(-1px); border-color: #94a3b8; }
    .status-line { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .status-line strong { font-size: 1rem; }
    .pill {
      border-radius: 999px;
      padding: 6px 10px;
      color: #fff;
      font-weight: 900;
      font-size: .9rem;
      min-width: 76px;
      text-align: center;
    }
    .pill.free { background: var(--free); }
    .pill.busy { background: var(--busy); }
    .pill.checking { background: var(--checking); }
    .pill.error { background: var(--error); }
    .detail { margin-top: 8px; color: var(--muted); font-size: .88rem; font-weight: 700; line-height: 1.45; }
    .notice { color: var(--muted); font-size: .84rem; line-height: 1.5; margin-top: auto; }
    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
      .side-card { order: -1; }
      .status-list { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    }
    @media (max-width: 640px) {
      .topbar { align-items: flex-start; flex-direction: column; }
      .clock { text-align: left; }
      .map-head { align-items: flex-start; flex-direction: column; }
      .legend { justify-content: flex-start; }
      .status-list { grid-template-columns: 1fr; }
      .room-zone { border-width: 3px; }
      .room-label { padding: 5px 6px; border-radius: 10px; width: min(88%, 140px); }
      .room-name { font-size: .72rem; }
      .room-status { font-size: 1rem; }
      .room-sub { font-size: .55rem; }
      .room-sub { display: none; }
    }
  </style>
</head>
<body>

        <h1>フリー室 空室状況マップ</h1>

  <script>
    const GAS_ENDPOINT = 'https://script.google.com/macros/s/AKfycbx8bTCgmSMLnTPOb9xTxLE5t0nDfXyfL2v8EXMGvfuyg4bjCaggJ6DP2bk7CxCpI-EZ/exec';
    const API_KEY = '8169';

    const ROOMS = [
      { id: 'room-4', name: 'フリー室1' },
      { id: 'room-5', name: 'フリー室2' },
      { id: 'room-6', name: 'フリー室3' }
    ];

    document.addEventListener('DOMContentLoaded', () => {
      tickClock();
      setInterval(tickClock, 10000);
      refreshAll();
      setInterval(refreshAll, 30000);
    });

    function tickClock() {
      const now = new Date();
      document.getElementById('clockTime').textContent = now.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
      document.getElementById('clockDate').textContent = now.toLocaleDateString('ja-JP', { year: 'numeric', month: '2-digit', day: '2-digit', weekday: 'short' });
    }

    function jsonp(resourceId) {
      return new Promise((resolve, reject) => {
        const callbackName = 'gasMapCallback_' + Date.now() + '_' + Math.floor(Math.random() * 100000);
        const params = { api: 'quickStatus', apiKey: API_KEY, resourceId, callback: callbackName };
        const url = GAS_ENDPOINT + (GAS_ENDPOINT.includes('?') ? '&' : '?') + new URLSearchParams(params).toString();
        const script = document.createElement('script');
        const timer = setTimeout(() => { cleanup(); reject(new Error('タイムアウト')); }, 30000);
        function cleanup() {
          clearTimeout(timer);
          delete window[callbackName];
          if (script.parentNode) script.parentNode.removeChild(script);
        }
        window[callbackName] = data => {
          cleanup();
          if (data && data.ok === false) reject(new Error(data.message || 'APIエラー'));
          else resolve(data || {});
        };
        script.onerror = () => { cleanup(); reject(new Error('取得失敗')); };
        script.src = url;
        document.body.appendChild(script);
      });
    }

    async function refreshAll() {
      const btn = document.getElementById('refreshBtn');
      btn.disabled = true;
      try {
        await Promise.all(ROOMS.map(async room => {
          try {
            const data = await jsonp(room.id);
            applyStatus(room.id, data.currentStatus);
          } catch (err) {
            applyError(room.id, err.message || String(err));
          }
        }));
        document.getElementById('lastUpdated').textContent = '最終更新：' + new Date().toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
      } finally {
        btn.disabled = false;
      }
    }

    function applyStatus(roomId, status) {
      if (!status) {
        updateRoom(roomId, 'checking', '確認中', '状況を確認しています。');
        return;
      }
      if (status.using) {
        const time = [status.startTime, status.endTime].filter(Boolean).join(' - ');
        const message = time ? time + ' 使用中' : (status.message || 'ただいま利用中です。');
        updateRoom(roomId, 'busy', '使用中', message);
      } else {
        updateRoom(roomId, 'free', '空室', '現在このフリー室は空いています。');
      }
    }

    function applyError(roomId, message) {
      updateRoom(roomId, 'error', '未確認', '状況を取得できませんでした。' + (message ? '（' + message + '）' : ''));
    }

    function updateRoom(roomId, state, label, detail) {
      const zone = document.getElementById('zone-' + roomId);
      const pill = document.getElementById('pill-' + roomId);
      zone.classList.remove('free', 'busy', 'checking', 'error');
      zone.classList.add(state);
      pill.className = 'pill ' + state;
      pill.textContent = label;
      document.getElementById('map-status-' + roomId).textContent = label;
      document.getElementById('map-detail-' + roomId).textContent = detail;
      document.getElementById('side-detail-' + roomId).textContent = detail;
      zone.setAttribute('aria-label', zone.querySelector('.room-name').textContent + '：' + label + '。クリックして予約画面を開く');
    }
  </script>
